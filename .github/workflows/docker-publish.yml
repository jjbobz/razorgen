name: Build and push to Docker Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags: always push 'latest', also tag with the git SHA for traceability
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/razorgen:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/razorgen:${{ github.sha }}
          # Cache layers between builds for faster CI
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Pushed to Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/razorgen:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/razorgen:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
