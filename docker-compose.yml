services:
  razorgen:
    image: jjbobz/razorgen:latest
    build: .
    ports:
      - "43000:43000"
    volumes:
      - /mnt/cache/appdata/razorgen/.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:43000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
